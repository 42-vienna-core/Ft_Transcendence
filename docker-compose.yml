services:
  nginx:
    container_name: ngnx
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - avatars:/uploads/avatars:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: dev
    environment:
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules 
    networks:
      - app_network
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: backend
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - avatars:/uploads/avatars
      - /app/node_modules 
    networks:
      - app_network
    environment:
        PORT: ${PORT}
        API_PREFIX: ${API_PREFIX}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        DATABASE_URL: ${DATABASE_URL}
        JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
        JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
        JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
        JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
    command: |
      sh -c "
      npx prisma db push --schema=/app/prisma/schema.prisma && \
      npx prisma generate --schema=/app/prisma/schema.prisma && \
      npm run start:dev
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snake_pass}
      POSTGRES_DB: ${POSTGRES_DB:-snakedb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snake} -d ${POSTGRES_DB:-snakedb}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - app_network

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - app_network

volumes:
  pgdata:
  redisdata:
  avatars:

networks:
  app_network:
    driver: bridge
